name: Sanity CI

on:
  push:
  pull_request:

jobs:
  sanity:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Dependency sanity
        run: python -m pip check

      - name: Compile sanity
        run: python -m compileall selfrag

      - name: Import smoke tests
        run: |
          python -c "import selfrag"
          python -c "import selfrag.cli; import selfrag.webui"

      - name: Module help smoke test
        run: python -m selfrag.eval --help
